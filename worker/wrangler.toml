name = "webui-xl"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[assets]
directory = "./static"
binding = "ASSETS"

[vars]
ENVIRONMENT = "development"
# Local dev: wrangler secret put SESSION_SECRET (or uses in-memory storage session key)

# Uncomment and fill after `wrangler d1 create` / `wrangler r2 bucket create`
# [[d1_databases]]
# binding = "DB"
# database_name = "webui-xl"
# database_id = "<d1-id>"
# migrations_dir = "migrations"

# [[r2_buckets]]
# binding = "DATA"
# bucket_name = "webui-xl-data"

# [[kv_namespaces]]
# binding = "KV"
# id = "<kv-id>"

# [[queues.producers]]
# binding = "PURCHASE_QUEUE"
# queue = "purchase-jobs"

# [[queues.consumers]]
# queue = "purchase-jobs"
# max_batch_size = 1
# max_retries = 3

[dev]
port = 8787